spring.application.name=barber

# Conexão com o Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bahia
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração JWT
api.security.token.secret=${JWT_SECRET}

# ===================================================================
# CONFIGURAÇÃO DO FLYWAY
# ===================================================================
# Ativa a execução automática das migrações ao iniciar a aplicação
spring.flyway.enabled=true

# Diretório padrão onde ficarão as migrations
spring.flyway.locations=classpath:db/migration

# Garante que o Flyway rode antes do Hibernate validar o esquema
spring.jpa.hibernate.ddl-auto=validate